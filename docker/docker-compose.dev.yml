name: production-planning-dev

# Layer 2: DB only. Julia runs natively so Revise.jl works.
#
# Usage: docker compose -f docker/docker-compose.dev.yml up
# Julia connects to localhost:5432 via config.local.toml.

services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB:       planning
      POSTGRES_USER:     planning
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

volumes:
  postgres_data_dev:
